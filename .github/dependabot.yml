version: 2
updates:
  # Python dependencies of the core package
  - package-ecosystem: pip
    directory: /packages/core
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    groups:
      python-deps:
        patterns: ["*"]

  # GitHub Actions used by the workflows
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
